name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Lint (swift-format)
        run: |
          xcrun swift-format lint \
            --recursive --strict \
            --configuration .swift-format \
            Sources Tests

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test
